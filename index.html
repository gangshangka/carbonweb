<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秦岭碳汇监测平台</title>
    <meta name="description" content="秦岭碳汇时空监测平台 - 碳汇与碳排放数据可视化">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="co2_emission_data.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: #080c12;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: linear-gradient(165deg, #0a1628 0%, #0d1f1a 35%, #0f1a1f 65%, #080c12 100%);
        }

        .main-wrap {
            position: relative; z-index: 1;
            max-width: 860px; margin: 0 auto; padding: 20px 16px 40px;
        }

        .header {
            text-align: center; padding: 20px 0 8px;
        }
        .header .icon {
            width: 48px; height: 48px; margin: 0 auto 12px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(100,180,130,0.22), rgba(80,160,200,0.22));
            border: 1px solid rgba(130,190,160,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .header h1 {
            font-size: clamp(18px, 5vw, 24px);
            font-weight: 700; letter-spacing: 3px;
            background: linear-gradient(135deg, #a0d8b0, #78c8e8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .header .sub {
            font-size: 11px; color: rgba(170,195,200,0.45); letter-spacing: 4px;
        }

        .chart-card {
            background: rgba(20,28,36,0.75);
            border: 1px solid rgba(130,190,160,0.12);
            border-radius: 14px; margin-bottom: 18px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow: hidden;
        }
        .chart-card .card-head {
            padding: 14px 18px 0;
            font-size: 13px; color: rgba(180,200,200,0.6);
            letter-spacing: 2px;
        }
        .chart-card .chart-body {
            width: 100%; height: 380px;
        }

        .raster-link-wrap {
            text-align: center; margin-top: 24px;
        }
        .raster-link {
            display: inline-block;
            padding: 10px 28px;
            border-radius: 20px;
            background: rgba(30,50,40,0.45);
            border: 1px solid rgba(130,190,160,0.2);
            color: rgba(180,210,195,0.55);
            font-size: 12px; letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .raster-link:hover {
            background: rgba(40,70,55,0.55);
            color: rgba(200,230,215,0.8);
            border-color: rgba(130,190,160,0.4);
        }

        .footer-text {
            text-align: center; padding: 10px 0 4px;
            font-size: 10px; color: rgba(255,255,255,0.1); letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="main-wrap">
        <div class="header">
            <div class="icon">🌲</div>
            <h1>秦岭碳汇监测平台</h1>
            <div class="sub">QINLING CARBON SINK MONITORING</div>
        </div>

        <div class="chart-card">
            <div class="card-head">▸ 二氧化碳排放趋势 / CO₂ Emission Trend</div>
            <div class="chart-body" id="chartTrend"></div>
        </div>

        <div class="chart-card">
            <div class="card-head">▸ 各区县排放对比 / County Comparison (2024)</div>
            <div class="chart-body" id="chartBar"></div>
        </div>

        <div class="raster-link-wrap">
            <a class="raster-link" href="qinling_raster.html">查看 3D 碳汇热力图 →</a>
        </div>
        <div class="footer-text">
            秦岭碳汇监测平台 &nbsp;|&nbsp;
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener" style="color:rgba(255,255,255,0.12);text-decoration:none;">陕ICP备2025062301号-3</a>
        </div>
    </div>

    <script>
    (function() {
        // --- Build year→total emission map ---
        var yearTotal = {};
        var yearData = {}; // year → [sorted county emissions]
        co2EmissionData.forEach(function(d) {
            yearTotal[d.year] = (yearTotal[d.year] || 0) + d.emission;
            if (!yearData[d.year]) yearData[d.year] = [];
            yearData[d.year].push({ county: d.county, city: d.city, emission: d.emission });
        });
        var years = Object.keys(yearTotal).sort();
        var totals = years.map(function(y) { return yearTotal[y]; });

        // --- Chart 1: CO2 emission trend (area chart = terrain-like) ---
        var chartTrend = echarts.init(document.getElementById('chartTrend'), null, {
            devicePixelRatio: Math.min(window.devicePixelRatio, 2)
        });
        chartTrend.setOption({
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(15,22,32,0.92)',
                borderColor: 'rgba(130,190,160,0.25)',
                textStyle: { color: '#ccc', fontSize: 12 }
            },
            grid: { left: 50, right: 24, top: 20, bottom: 60 },
            xAxis: {
                type: 'category', data: years,
                axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                axisTick: { show: false },
                axisLabel: { color: 'rgba(180,200,200,0.5)', fontSize: 11 }
            },
            yAxis: {
                type: 'value',
                name: '吨 CO₂',
                nameTextStyle: { color: 'rgba(180,200,200,0.4)', fontSize: 10 },
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.04)' } },
                axisLabel: {
                    color: 'rgba(180,200,200,0.45)', fontSize: 10,
                    formatter: function(v) { return (v / 1e6).toFixed(1) + 'M'; }
                }
            },
            dataZoom: [{
                type: 'slider', start: 70, end: 100, height: 20, bottom: 8,
                backgroundColor: 'rgba(255,255,255,0.03)',
                fillerColor: 'rgba(100,180,150,0.08)',
                dataBackground: {
                    lineStyle: { color: 'rgba(180,200,200,0.2)' },
                    areaStyle: { color: 'rgba(180,200,200,0.04)' }
                },
                selectedDataBackground: {
                    lineStyle: { color: 'rgba(160,210,180,0.3)' },
                    areaStyle: { color: 'rgba(160,210,180,0.06)' }
                },
                handleStyle: { color: 'rgba(140,200,160,0.4)' },
                textStyle: { color: 'rgba(180,200,200,0.4)', fontSize: 9 }
            }],
            series: [{
                type: 'line',
                data: totals,
                smooth: true,
                symbol: 'circle', symbolSize: 6,
                lineStyle: { color: '#78c8e8', width: 1.5 },
                itemStyle: {
                    color: '#78c8e8',
                    borderColor: 'rgba(120,200,232,0.3)',
                    borderWidth: 2
                },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(79,195,247,0.2)' },
                        { offset: 0.6, color: 'rgba(102,187,106,0.08)' },
                        { offset: 1, color: 'rgba(102,187,106,0.01)' }
                    ])
                }
            }]
        });

        // --- Chart 2: County bar chart (2024, sorted) ---
        var data2024 = (yearData['2024'] || []).slice().sort(function(a, b) {
            return b.emission - a.emission;
        });
        var barNames = data2024.map(function(d) { return d.county; });
        var barValues = data2024.map(function(d) { return d.emission; });

        var chartBar = echarts.init(document.getElementById('chartBar'), null, {
            devicePixelRatio: Math.min(window.devicePixelRatio, 2)
        });
        chartBar.setOption({
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(15,22,32,0.92)',
                borderColor: 'rgba(130,190,160,0.25)',
                textStyle: { color: '#ccc', fontSize: 12 },
                formatter: function(p) {
                    var d = p[0];
                    var item = data2024[d.dataIndex];
                    return item.county + ' (' + item.city + ')<br/>排放量: ' + (d.value / 1e6).toFixed(2) + ' Mt CO₂';
                }
            },
            grid: { left: 60, right: 24, top: 16, bottom: 60 },
            xAxis: {
                type: 'category', data: barNames,
                axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                axisTick: { show: false },
                axisLabel: { color: 'rgba(180,200,200,0.45)', fontSize: 10, rotate: 45 }
            },
            yAxis: {
                type: 'value',
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.04)' } },
                axisLabel: {
                    color: 'rgba(180,200,200,0.45)', fontSize: 10,
                    formatter: function(v) { return (v / 1e6).toFixed(1) + 'M'; }
                }
            },
            dataZoom: [{
                type: 'slider', start: 70, end: 100, height: 20, bottom: 8,
                backgroundColor: 'rgba(255,255,255,0.03)',
                fillerColor: 'rgba(100,180,150,0.08)',
                textStyle: { color: 'rgba(180,200,200,0.4)', fontSize: 9 }
            }],
            series: [{
                type: 'bar', data: barValues,
                barWidth: '55%',
                itemStyle: {
                    borderRadius: [4, 4, 0, 0],
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#78c8e8' },
                        { offset: 1, color: '#66bb6a' }
                    ])
                }
            }]
        });

        // Responsive resize
        var resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                chartTrend.resize();
                chartBar.resize();
            }, 150);
        });
    })();
    </script>
</body>
</html>
