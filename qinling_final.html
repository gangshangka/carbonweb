<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秦岭碳汇 3D 遥感</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/cesium/1.118.0/files/Build/Cesium/Widgets/widgets.css" />
    <style>
        html, body, #cesiumContainer { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
        .loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.7); color:white; padding:20px; border-radius:8px; font-size:20px; z-index:3000; }
        .toolbar { position:absolute; left:12px; top:20px; z-index:2000; display:flex; flex-direction:column; gap:8px; }
        .panel { background:rgba(20,20,30,0.8); backdrop-filter:blur(8px); border:1px solid #555; border-radius:8px; padding:10px; color:#ddd; }
        select, button { margin:4px 0; padding:5px; background:#333; color:white; border:1px solid #666; border-radius:4px; }
        .btn-icon { width:40px; height:40px; background:rgba(20,20,30,0.8); border:1px solid #555; color:#ddd; border-radius:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; }
        .btn-icon:hover { background:rgba(30,60,90,0.9); }
        .legend { position:absolute; right:20px; bottom:40px; z-index:2000; background:rgba(20,20,30,0.8); backdrop-filter:blur(8px); padding:12px 14px; border-radius:8px; color:#ccc; font-size:13px; border:1px solid #555; width:170px; }
        .legend .bar { height:20px; margin:6px 0; border-radius:4px; background: linear-gradient(to right, #f7fcf5, #4daf4a, #00441b); }
        .legend .labels { display:flex; justify-content:space-between; font-size:11px; }
        #statusLog { position:absolute; top:10px; left:10px; z-index:3000; background:rgba(0,0,0,0.7); color:lime; padding:10px; border-radius:5px; font-family:monospace; white-space:pre-line; max-width:400px; display:none; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div class="loading" id="loadingMsg">🌍 正在加载地球...</div>

    <div class="toolbar" id="toolbar" style="display:none;">
        <div class="panel">
            <div>年份</div>
            <select id="yearSelect"></select>
            <div>月份</div>
            <select id="monthSelect"></select>
        </div>
        <div class="btn-icon" id="zoomInBtn" title="放大">➕</div>
        <div class="btn-icon" id="zoomOutBtn" title="缩小">➖</div>
        <div class="btn-icon" id="flyQinling" title="飞到秦岭">🏔️</div>
        <div class="btn-icon" id="flyGlobal" title="全球视角">🌍</div>
    </div>

    <div class="legend" id="legendPanel" style="display:none;">
        <div style="text-align:center; font-weight:bold;">碳汇强度</div>
        <div class="bar"></div>
        <div class="labels">
            <span id="minVal">-10</span>
            <span id="maxVal">10</span>
        </div>
        <div style="margin-top:6px; font-size:11px; opacity:0.7;">单位: gC·m⁻²·month⁻¹</div>
    </div>

    <div id="statusLog"></div> <!-- 调试日志，默认隐藏 -->

    <script src="https://registry.npmmirror.com/cesium/1.118.0/files/Build/Cesium/Cesium.js"></script>
    <script>
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMjE3N2ZhYi1mOWVhLTQ4YzEtYjdhNy00Nzg2Yzk4N2Q0YWMiLCJpZCI6NDIzMzA0LCJpYXQiOjE3NzcwODMyNTJ9.yuG5-alVYwL_05VXUplwaS7FAsonO95_JucXwiwBTv4';

        const statusLog = document.getElementById('statusLog');
        function log(msg) { statusLog.innerText += '\n' + msg; console.log(msg); }

        let viewer;
        let currentYear, currentMonth;
        let geoJSON, carbonData;
        let entities = [];

        // 获取碳汇值
        function getValue(name, year, month) {
            try { return carbonData[year]?.[month]?.[name] ?? null; }
            catch { return null; }
        }

        // 动态计算范围
        function computeRange(year, month) {
            let min = Infinity, max = -Infinity;
            if (!geoJSON) return { min: 0, max: 1 };
            geoJSON.features.forEach(f => {
                const v = getValue(f.properties.NAME, year, month);
                if (v !== null && !isNaN(v)) {
                    if (v < min) min = v;
                    if (v > max) max = v;
                }
            });
            if (min === Infinity) return { min: 0, max: 1 };
            if (min === max) return { min: min - 0.5, max: max + 0.5 };
            return { min, max };
        }

        // 颜色映射
        function getColor(value, min, max) {
            if (value === null || isNaN(value)) return Cesium.Color.GRAY.withAlpha(0.3);
            const t = Math.max(0, Math.min(1, (value - min) / (max - min)));
            return Cesium.Color.fromHsl(
                0.33 - 0.3 * t,  // 绿到蓝绿
                0.8,
                0.35 + 0.3 * t,
                0.75
            );
        }

        // 刷新图层颜色
        function refreshColors() {
            if (!viewer || entities.length === 0) return;
            const range = computeRange(currentYear, currentMonth);
            document.getElementById('minVal').textContent = range.min.toFixed(2);
            document.getElementById('maxVal').textContent = range.max.toFixed(2);
            entities.forEach(entity => {
                const name = entity.properties?.NAME?.getValue();
                if (!name) return;
                const v = getValue(name, currentYear, currentMonth);
                const color = getColor(v, range.min, range.max);
                entity.polygon.material = new Cesium.ColorMaterialProperty(color);
                entity.description = '<b>' + name + '</b><br>碳汇：' + (v !== null ? v.toFixed(2) : '无数据');
            });
        }

        // 加载秦岭数据 (CDN + 本地回退)
        async function loadQinlingData() {
            try {
                log('📥 尝试 CDN 加载数据...');
                [geoJSON, carbonData] = await Promise.all([
                    fetch('https://cdn.jsdelivr.net/gh/gangshangka/qinling-carbon-map@carbon-map/static/data/qinling.geojson').then(r => r.json()),
                    fetch('https://cdn.jsdelivr.net/gh/gangshangka/qinling-carbon-map@carbon-map/static/data/carbonData2.json').then(r => r.json())
                ]);
                log('✅ CDN 数据加载成功');
            } catch (e) {
                log('⚠ CDN 失败，尝试本地文件...');
                try {
                    [geoJSON, carbonData] = await Promise.all([
                        fetch('qinling.geojson').then(r => r.json()),
                        fetch('carbonData2.json').then(r => r.json())
                    ]);
                    log('✅ 本地数据加载成功');
                } catch (localErr) {
                    alert('所有数据加载方式均失败。请检查网络或本地文件。');
                    throw localErr;
                }
            }

            // 添加 GeoJSON 图层
            const dataSource = await Cesium.GeoJsonDataSource.load(geoJSON, {
                stroke: Cesium.Color.DARKGRAY,
                fill: Cesium.Color.GRAY.withAlpha(0.3),
                strokeWidth: 2
            });
            viewer.dataSources.add(dataSource);
            entities = dataSource.entities.values;
            log(`🎉 已添加 ${entities.length} 个县区边界`);

            // 初始化时间选择器
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            const years = Object.keys(carbonData).sort();
            const months = Array.from({ length: 12 }, (_, i) => String(i + 1));

            years.forEach(y => yearSelect.appendChild(new Option(y, y)));
            months.forEach(m => monthSelect.appendChild(new Option(m + '月', m)));

            currentYear = years[years.length - 1];
            currentMonth = '1';
            yearSelect.value = currentYear;
            monthSelect.value = currentMonth;

            yearSelect.addEventListener('change', () => {
                currentYear = yearSelect.value;
                refreshColors();
            });
            monthSelect.addEventListener('change', () => {
                currentMonth = monthSelect.value;
                refreshColors();
            });

            // 初次刷新
            refreshColors();

            // 显示工具栏和图例
            document.getElementById('toolbar').style.display = 'flex';
            document.getElementById('legendPanel').style.display = 'block';
            log('🟢 完整系统就绪');
        }

        // 初始化地球
        async function initGlobe() {
            try {
                log('🌐 初始化地球...');

                // 影像层 (同步)
                const imageryLayer = Cesium.ImageryLayer.fromWorldImagery({
                    style: Cesium.IonWorldImageryStyle.AERIAL
                });
                // 地形 (异步)
                const terrain = await Cesium.createWorldTerrainAsync({
                    requestWaterMask: true,
                    requestVertexNormals: true
                });

                viewer = new Cesium.Viewer('cesiumContainer', {
                    terrainProvider: terrain,
                    imageryProvider: imageryLayer.imageryProvider,
                    animation: false, timeline: false, fullscreenButton: false,
                    homeButton: false, sceneModePicker: false, baseLayerPicker: false,
                    navigationHelpButton: false, geocoder: false, infoBox: false,
                    selectionIndicator: false
                });

                viewer.cesiumWidget.creditContainer.style.display = 'none';
                viewer.scene.globe.enableLighting = true;

                viewer.camera.setView({
                    destination: Cesium.Cartesian3.fromDegrees(108, 35, 15000000),
                    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 }
                });

                // 隐藏加载文字
                document.getElementById('loadingMsg').style.display = 'none';
                log('🌍 地球已显示');

                // 按钮事件
                document.getElementById('zoomInBtn').onclick = () => viewer.camera.zoomIn(100000);
                document.getElementById('zoomOutBtn').onclick = () => viewer.camera.zoomOut(100000);
                document.getElementById('flyQinling').onclick = () => {
                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(108.2, 33.8, 250000),
                        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-60), roll: 0 }
                    });
                };
                document.getElementById('flyGlobal').onclick = () => {
                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(108, 35, 15000000),
                        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 }
                    });
                };

                // 点击查询
                const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
                handler.setInputAction(function(click) {
                    const picked = viewer.scene.pick(click.position);
                    if (Cesium.defined(picked) && picked.id?.properties) {
                        const name = picked.id.properties.NAME?.getValue();
                        const val = getValue(name, currentYear, currentMonth);
                        alert(name + '\n碳汇：' + (val !== null ? val.toFixed(2) : '无数据'));
                    }
                }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

                // 加载秦岭数据
                await loadQinlingData();

                // 隐藏日志
                setTimeout(() => { statusLog.style.display = 'none'; }, 3000);
            } catch (e) {
                log('💥 致命错误: ' + e.message);
                console.error(e);
            }
        }

        initGlobe();
    </script>
</body>
</html>
