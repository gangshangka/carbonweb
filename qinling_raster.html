<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>з§ҰеІӯзўіжұҮ 3D ж …ж јзғӯеҠӣеӣҫ</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/cesium/1.118.0/files/Build/Cesium/Widgets/widgets.css" />
    <style>
        html, body, #cesiumContainer { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; }
        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(10,10,20,0.85); backdrop-filter: blur(10px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.4s ease;
        }
        .loading-box {
            text-align: center; color: #fff;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px; padding: 30px 50px; backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .loading-text { font-size: 20px; margin-bottom: 16px; letter-spacing: 1px; }
        .progress-bar {
            width: 280px; height: 6px; background: rgba(255,255,255,0.15);
            border-radius: 3px; overflow: hidden; margin: 0 auto 10px;
        }
        .progress-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, #4fc3f7, #81c784);
            border-radius: 3px; transition: width 0.3s ease;
        }
        .progress-num { font-size: 16px; opacity: 0.8; }
        .current-label {
            position: absolute; top: 12px; left: 12px; z-index: 2000;
            background: rgba(20,20,30,0.78); backdrop-filter: blur(8px);
            color: #fff; padding: 6px 14px; border-radius: 6px;
            font-size: 18px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }
        .toolbar {
            position: absolute; left: 12px; top: 60px; z-index: 2000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .panel {
            background: rgba(20,20,30,0.78); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
            padding: 10px; color: #ddd; width: 110px;
        }
        .panel select {
            width: 100%; margin: 4px 0; padding: 4px;
            background: #2a2a3a; color: white; border: 1px solid #555; border-radius: 4px;
        }
        .btn-icon {
            width: 40px; height: 40px;
            background: rgba(20,20,30,0.78); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2); color: #ddd;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px; transition: 0.2s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.1); color: white; }
        .btn-icon.play { font-size: 22px; }
        .legend {
            position: absolute; right: 20px; bottom: 80px; z-index: 2000;
            background: rgba(20,20,30,0.78); backdrop-filter: blur(8px);
            padding: 12px 14px; border-radius: 8px; color: #ccc; font-size: 13px;
            border: 1px solid rgba(255,255,255,0.2); width: 170px;
        }
        .legend .bar {
            height: 18px; margin: 6px 0; border-radius: 4px;
            background: linear-gradient(to right, #D7191C, #FDAE61, #FFFFBF, #A6D96A, #1A9641);
        }
        .legend .labels { display: flex; justify-content: space-between; font-size: 11px; }
        .timeline-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: rgba(20,20,30,0.72); backdrop-filter: blur(10px);
            padding: 8px 16px; border-radius: 20px; display: flex; align-items: center;
            gap: 12px; border: 1px solid rgba(255,255,255,0.2); color: #eee;
            font-size: 13px; min-width: 360px;
        }
        .timeline-container input[type=range] {
            flex: 1; background: transparent; accent-color: #4fc3f7;
        }
        .timeline-label { white-space: nowrap; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="loading-text" id="loadingText">жӯЈеңЁеҠ иҪҪз§ҰеІӯзўіжұҮж•°жҚ®</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-num" id="progressNum">0%</div>
        </div>
    </div>

    <div id="cesiumContainer"></div>
    <div class="current-label" id="currentLabel">вң… еҠ иҪҪдёӯ...</div>

    <div class="toolbar" id="toolbar">
        <div class="panel">
            <div style="font-size:12px; margin-bottom:2px;">е№ҙд»Ҫ</div>
            <select id="yearSelect"></select>
            <div style="font-size:12px; margin-bottom:2px; margin-top:6px;">жңҲд»Ҫ</div>
            <select id="monthSelect"></select>
        </div>
        <div class="btn-icon" id="zoomInBtn" title="ж”ҫеӨ§">вһ•</div>
        <div class="btn-icon" id="zoomOutBtn" title="зј©е°Ҹ">вһ–</div>
        <div class="btn-icon" id="flyQinling" title="ж–ңи§Ҷз§ҰеІӯ">рҹҸ”пёҸ</div>
        <div class="btn-icon" id="flyVertical" title="еһӮзӣҙз§ҰеІӯ">в¬ҮпёҸ</div>
        <div class="btn-icon play" id="playBtn" title="ж’ӯж”ҫ/жҡӮеҒң" style="pointer-events:none;opacity:0.4;">в–¶</div>
        <div class="btn-icon" id="speedBtn" title="ж’ӯж”ҫйҖҹеәҰ" style="pointer-events:none;opacity:0.4;">0.25x</div>
    </div>

    <div class="legend" id="legendPanel">
        <div style="text-align:center; font-weight:bold;">зўіжұҮејәеәҰ</div>
        <div class="bar"></div>
        <div class="labels"><span>дҪҺ</span><span>й«ҳ</span></div>
        <div style="margin-top:6px; font-size:11px; opacity:0.7;">еҚ•дҪҚ: gCВ·mвҒ»ВІВ·monthвҒ»В№</div>
    </div>

    <div class="timeline-container" id="timelineContainer">
        <span class="timeline-label" id="timeStart">2012-01</span>
        <input type="range" id="timeSlider" min="0" max="0" value="0" step="1" disabled>
        <span class="timeline-label" id="timeEnd">2022-12</span>
    </div>

    <script src="https://registry.npmmirror.com/cesium/1.118.0/files/Build/Cesium/Cesium.js"></script>
    <script>
        // --- WebGL2 иғҪеҠӣжЈҖжөӢпјҲжүӢжңә GPU е…је®№жҖ§й—ЁзҰҒпјү ---
        // зј–иҜ‘дёҖдёӘдёҺ Cesium еӨҚжқӮеәҰзӣёиҝ‘зҡ„ shader жқҘйӘҢиҜҒ GPU й©ұеҠЁ
        var _webgl2Ok = false;
        (function() {
            try {
                var c = document.createElement('canvas');
                var gl = c.getContext('webgl2', { failIfMajorPerformanceCaveat: false, antialias: false, powerPreference: 'low-power' });
                if (gl) {
                    var vs = gl.createShader(gl.VERTEX_SHADER);
                    var fs = gl.createShader(gl.FRAGMENT_SHADER);
                    if (vs && fs) {
                        gl.shaderSource(vs, '#version 300 es\nin vec3 a;uniform mat4 m;void main(){gl_Position=m*vec4(a,1);}');
                        gl.compileShader(vs);
                        if (gl.getShaderParameter(vs, gl.COMPILE_STATUS)) {
                            gl.shaderSource(fs, '#version 300 es\nprecision highp float;uniform sampler2D t;in vec2 v;out vec4 o;void main(){o=texture(t,v);}');
                            gl.compileShader(fs);
                            if (gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
                                var prog = gl.createProgram();
                                gl.attachShader(prog, vs); gl.attachShader(prog, fs);
                                gl.linkProgram(prog);
                                if (gl.getProgramParameter(prog, gl.LINK_STATUS)) {
                                    _webgl2Ok = true;
                                }
                                gl.deleteProgram(prog);
                            }
                        }
                        gl.deleteShader(vs); gl.deleteShader(fs);
                    }
                    var lose = gl.getExtension('WEBGL_lose_context');
                    if (lose) lose.loseContext();
                }
            } catch(e) {}
            if (!_webgl2Ok) {
                document.getElementById('loadingText').textContent = 'жӮЁзҡ„и®ҫеӨҮ GPU дёҚж”ҜжҢҒжӯӨйЎөйқў';
                document.getElementById('progressNum').textContent = 'иҜ·дҪҝз”ЁжЎҢйқўжөҸи§ҲеҷЁжҲ–жӣҙж–°жүӢжңәзі»з»ҹеҗҺйҮҚиҜ•';
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressFill').style.background = 'linear-gradient(90deg, #e57373, #ef5350)';
                throw new Error('WebGL2 shader compilation failed');
            }
        })();

        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMjE3N2ZhYi1mOWVhLTQ4YzEtYjdhNy00Nzg2Yzk4N2Q0YWMiLCJpZCI6NDIzMzA0LCJpYXQiOjE3NzcwODMyNTJ9.yuG5-alVYwL_05VXUplwaS7FAsonO95_JucXwiwBTv4';

        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

        const loadingOverlay = document.getElementById('loadingOverlay');
        const progressFill = document.getElementById('progressFill');
        const progressNum = document.getElementById('progressNum');
        const loadingText = document.getElementById('loadingText');

        function setProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressNum.textContent = percent + '%';
            if (text) loadingText.textContent = text;
        }
        function hideLoading() {
            loadingOverlay.style.opacity = '0';
            setTimeout(() => { loadingOverlay.style.display = 'none'; }, 400);
        }

        let viewer;
        let placeholderLayer = null;
        let layerA = null, layerB = null;
        let activeLayer = 'A';
        let currentYear, currentMonth;
        let availableYears = [], availableMonths = [];
        let allMonthsList = [];
        let timer = null, playing = false;
        let transitionTimer = null;
        let playSpeed = 2000; // й»ҳи®Ө 0.25x (2000ms/её§)

        const qinlingRect = Cesium.Rectangle.fromDegrees(105.4879751, 32.4823747, 111.0302090, 34.5393788);
        const currentLabel = document.getElementById('currentLabel');
        const timeSlider = document.getElementById('timeSlider');
        const timeStart = document.getElementById('timeStart');
        const timeEnd = document.getElementById('timeEnd');

        var IMG_BASE = (function() { var p = location.pathname.replace(/\/[^/]*$/, '/'); return location.origin + p + 'tif/'; })();

        function getImgUrl(year, month) {
            const mm = month.padStart(2, '0');
            return IMG_BASE + 'color_nep' + year + mm + '.png';
        }
        function updateUI(year, month, fromSlider = false) {
            const mm = month.padStart(2, '0');
            currentLabel.textContent = `вң… ${year}-${mm}`;
            document.getElementById('yearSelect').value = year;
            document.getElementById('monthSelect').value = month;
            if (!fromSlider) {
                const idx = allMonthsList.findIndex(m => m.year === year && m.month === month);
                if (idx >= 0) timeSlider.value = idx;
            }
        }

        async function createHeatmapLayer(year, month) {
            const provider = new Cesium.SingleTileImageryProvider({
                url: getImgUrl(year, month),
                rectangle: qinlingRect
            });
            const layer = viewer.imageryLayers.addImageryProvider(provider);
            layer.alpha = 0;
            await provider.readyPromise;
            return layer;
        }

        // A/B еҸҢеӣҫеұӮдәӨеҸүж·Ўе…ҘпјҲеҸӮиҖғеҫ®дҝЎе°ҸзЁӢеәҸ _crossFadeToNextLayerпјү
        function crossfade(fromLayer, toLayer, duration = 300) {
            if (transitionTimer) clearInterval(transitionTimer);
            const start = Date.now();
            transitionTimer = setInterval(() => {
                const elapsed = Date.now() - start;
                const t = Math.min(1, elapsed / duration);
                fromLayer.alpha = 0.8 * (1 - t);
                toLayer.alpha = 0.8 * t;
                if (t >= 1) {
                    clearInterval(transitionTimer);
                    transitionTimer = null;
                    if (fromLayer.alpha <= 0) viewer.imageryLayers.remove(fromLayer, false);
                }
            }, 16);
        }

        // д»…ж·ЎеҮәж—§еӣҫеұӮпјҲжҜҸе№ҙ1жңҲж— ж•°жҚ®ж—¶дҪҝз”ЁпјҢйңІеҮәеҚ дҪҚеә•еӣҫпјү
        function fadeOutLayer(layer, duration = 300) {
            if (transitionTimer) clearInterval(transitionTimer);
            const startAlpha = layer.alpha;
            const start = Date.now();
            transitionTimer = setInterval(() => {
                const t = Math.min(1, (Date.now() - start) / duration);
                layer.alpha = startAlpha * (1 - t);
                if (t >= 1) {
                    clearInterval(transitionTimer);
                    transitionTimer = null;
                    viewer.imageryLayers.remove(layer, false);
                }
            }, 16);
        }

        async function loadRaster(year, month, updateSlider = true) {
            if (currentYear === year && currentMonth === month) return false;

            // жҜҸе№ҙ1жңҲж— ж•°жҚ®пјҢи·іиҝҮзғӯеҠӣеӣҫеҠ иҪҪпјҲеҸӮиҖғеҫ®дҝЎе°ҸзЁӢеәҸ useLocalPlaceholderпјү
            const isJanuary = (month === '1');
            const newLayer = isJanuary ? null : await createHeatmapLayer(year, month);
            const oldLayer = activeLayer === 'A' ? layerA : layerB;

            if (newLayer) {
                if (activeLayer === 'A') layerB = newLayer; else layerA = newLayer;
                activeLayer = activeLayer === 'A' ? 'B' : 'A';
            } else {
                // 1жңҲпјҡжё…йҷӨжҙ»и·ғеӣҫеұӮж Үи®°пјҢеҸӘйқ еҚ дҪҚеә•еӣҫжҳҫзӨә
                activeLayer = '';
            }

            if (oldLayer) {
                if (newLayer) {
                    crossfade(oldLayer, newLayer);
                } else {
                    fadeOutLayer(oldLayer); // 1жңҲпјҡж·ЎеҮәж—§зғӯеҠӣеӣҫпјҢйңІеҮәеҚ дҪҚеә•еӣҫ
                }
            } else if (newLayer) {
                // йҰ–её§жёҗжҳҫпјҲеҸӮиҖғеҫ®дҝЎе°ҸзЁӢеәҸ onLayerALoad йҰ–ж¬Ўж·Ўе…Ҙпјү
                const fadeInStart = Date.now();
                const fadeTimer = setInterval(() => {
                    const t = Math.min(1, (Date.now() - fadeInStart) / 300);
                    newLayer.alpha = 0.8 * t;
                    if (t >= 1) clearInterval(fadeTimer);
                }, 16);
            }

            currentYear = year;
            currentMonth = month;
            updateUI(year, month, !updateSlider);
            return true;
        }

        function stopPlay() {
            if (timer) { clearTimeout(timer); timer = null; }
            playing = false;
            document.getElementById('playBtn').textContent = 'в–¶';
        }

        // йў„еҠ иҪҪжҺҘдёӢжқҘ count дёӘжңҲзҡ„еӣҫзүҮеҲ°жөҸи§ҲеҷЁзј“еӯҳ
        function preloadNext(year, month, count) {
            let yIdx = availableYears.indexOf(year);
            let mIdx = availableMonths.indexOf(month);
            if (yIdx === -1 || mIdx === -1) return;
            for (let i = 0; i < count; i++) {
                mIdx++;
                if (mIdx >= availableMonths.length) {
                    mIdx = 0;
                    yIdx++;
                    if (yIdx >= availableYears.length) break;
                }
                const img = new Image();
                img.src = getImgUrl(availableYears[yIdx], availableMonths[mIdx]);
            }
        }

        // жЁЎд»ҝеҫ®дҝЎе°ҸзЁӢеәҸ _startAutoPlayWithWait / _autoPlayNextWithWait жЁЎејҸ
        // load вҶ’ crossfade вҶ’ hold 500ms вҶ’ nextпјҲдҝқиҜҒжҜҸеј еӣҫеұ•зӨәж—¶й•ҝпјү
        async function playLoop() {
            if (!playing) return;
            const currentIdx = allMonthsList.findIndex(m => m.year === currentYear && m.month === currentMonth);
            if (currentIdx === -1 || currentIdx >= allMonthsList.length - 1) { stopPlay(); return; }
            const next = allMonthsList[currentIdx + 1];
            preloadNext(next.year, next.month, 3);
            await loadRaster(next.year, next.month, true);
            if (!playing) return;
            timer = setTimeout(playLoop, playSpeed);
        }

        function startPlay() {
            if (playing) return;
            playing = true;
            document.getElementById('playBtn').textContent = 'вҸё';
            preloadNext(currentYear, currentMonth, 3);
            playLoop();
        }

        function initTimeline() {
            for (let y = 2012; y <= 2022; y++)
                for (let m = 1; m <= 12; m++)
                    allMonthsList.push({ year: String(y), month: String(m) });
            availableYears = [...new Set(allMonthsList.map(m => m.year))].sort();
            availableMonths = Array.from({ length: 12 }, (_, i) => String(i + 1));

            const ySel = document.getElementById('yearSelect');
            const mSel = document.getElementById('monthSelect');
            availableYears.forEach(y => ySel.appendChild(new Option(y, y)));
            availableMonths.forEach(m => mSel.appendChild(new Option(m + 'жңҲ', m)));

            timeSlider.max = allMonthsList.length - 1;
            timeStart.textContent = '2012-01';
            timeEnd.textContent = '2022-12';

            const first = allMonthsList[6]; // 2012-07 (еӨҸеӯЈж•°жҚ®жӣҙжңүд»ЈиЎЁжҖ§)
            currentYear = first.year; currentMonth = first.month;
            ySel.value = currentYear; mSel.value = currentMonth;
            timeSlider.value = 6;
            updateUI(currentYear, currentMonth);

            ySel.onchange = async () => { currentYear = ySel.value; await loadRaster(currentYear, currentMonth, true); stopPlay(); };
            mSel.onchange = async () => { currentMonth = mSel.value; await loadRaster(currentYear, currentMonth, true); stopPlay(); };

            let isDragging = false;
            timeSlider.addEventListener('input', () => { isDragging = true; });
            timeSlider.addEventListener('change', async () => {
                if (!isDragging) return; isDragging = false;
                const idx = parseInt(timeSlider.value, 10);
                const { year, month } = allMonthsList[idx];
                stopPlay();
                await loadRaster(year, month, false);
            });
        }

        async function initGlobe() {
            setProgress(10, 'жӯЈеңЁеҠ иҪҪең°еҪў');
            const terrain = await Cesium.createWorldTerrainAsync({
                requestWaterMask: true,
                requestVertexNormals: true
            });

            setProgress(30, 'жӯЈеңЁеҠ иҪҪең°еҪўеә•еӣҫ');
            const imageryLayer = Cesium.ImageryLayer.fromWorldImagery({
                style: Cesium.IonWorldImageryStyle.TERRAIN
            });

            viewer = new Cesium.Viewer('cesiumContainer', {
                terrainProvider: terrain,
                imageryProvider: imageryLayer.imageryProvider,
                animation: false, timeline: false, fullscreenButton: false,
                homeButton: false, sceneModePicker: false, baseLayerPicker: false,
                navigationHelpButton: false, geocoder: false, infoBox: false,
                selectionIndicator: false,
                // з§»еҠЁз«ҜйҷҚй…ҚпјҡеҮҸе°‘ GPU еҺӢеҠӣе’Ң shader зј–иҜ‘иҙҹжӢ…
                resolutionScale: isMobile ? 0.5 : 1.0,
                requestRenderMode: true,
                maximumRenderTimeChange: Infinity,
                msaaSamples: isMobile ? 1 : 4
            });
            viewer.cesiumWidget.creditContainer.style.display = 'none';
            viewer.scene.globe.enableLighting = true;

            setProgress(60, 'жӯЈеңЁеҠ иҪҪз§ҰеІӯеҚ дҪҚеӣҫ');
            const placeholderProvider = new Cesium.SingleTileImageryProvider({
            url: 'tif/placeholder.png',
        rectangle: qinlingRect
});
            placeholderLayer = viewer.imageryLayers.addImageryProvider(placeholderProvider);
            // еҚ дҪҚеӣҫе§Ӣз»ҲдҪңдёәеә•еӣҫеұӮеӯҳеңЁпјҲеҸӮиҖғеҫ®дҝЎе°ҸзЁӢеәҸ placeholderImageUrlпјүпјҢеЎ«е……еҲҮжҚўзјқйҡҷ
            placeholderLayer.alpha = 0.2;

            setProgress(80, 'жӯЈеңЁеҮҶеӨҮзғӯеҠӣеӣҫж•°жҚ®');
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(108.259, 33.511, 400000),
                orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
                duration: 2,
                complete: () => {
                    setTimeout(() => viewer.camera.zoomIn(50000), 200);
                    setTimeout(() => viewer.camera.zoomIn(30000), 700);
                }
            });

            document.getElementById('zoomInBtn').onclick = () => viewer.camera.zoomIn(10000);
            document.getElementById('zoomOutBtn').onclick = () => viewer.camera.zoomOut(10000);
            document.getElementById('flyQinling').onclick = () => viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(108.259, 33.511, 180000),
                orientation: { heading: 0, pitch: Cesium.Math.toRadians(-55), roll: 0 }
            });
            document.getElementById('flyVertical').onclick = () => viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(108.259, 33.511, 400000),
                orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 }
            });

            document.getElementById('playBtn').addEventListener('click', () => {
                if (playing) stopPlay(); else startPlay();
            });

            // ж’ӯж”ҫйҖҹеәҰеҲҮжҚўпјҡ0.25x вҶ’ 0.5x вҶ’ 1x вҶ’ 2x вҶ’ 3x вҶ’ 0.25x
            const speeds = [
                { label: '0.25x', ms: 2000 },
                { label: '0.5x', ms: 1000 },
                { label: '1x', ms: 500 },
                { label: '2x', ms: 250 },
                { label: '3x', ms: 167 }
            ];
            let speedIdx = 0;
            document.getElementById('speedBtn').addEventListener('click', () => {
                speedIdx = (speedIdx + 1) % speeds.length;
                playSpeed = speeds[speedIdx].ms;
                document.getElementById('speedBtn').textContent = speeds[speedIdx].label;
            });

            initTimeline();

      setProgress(92, 'жӯЈеңЁйӘҢиҜҒж•°жҚ®зј“еӯҳ...');
await loadRaster('2012', '7', true);

// --- Image-ready guard: ensure heatmaps are cached before enabling controls ---
const IMAGE_READY_KEY = 'carbonweb_loaded';
function enableControls() {
    timeSlider.disabled = false;
    const playBtn = document.getElementById('playBtn');
    playBtn.style.pointerEvents = 'auto';
    playBtn.style.opacity = '1';
    const speedBtn = document.getElementById('speedBtn');
    speedBtn.style.pointerEvents = 'auto';
    speedBtn.style.opacity = '1';
}

function buildImageList() {
    const list = [];
    for (let y = 2012; y <= 2022; y++) {
        for (let m = 1; m <= 12; m++) {
            list.push('color_nep' + y + (m < 10 ? '0' + m : m) + '.png');
        }
    }
    return list;
}

async function verifyAndPreloadImages() {
    // жЈҖжҹҘеҠ иҪҪйЎөжҳҜеҗҰе·Ійў„еҠ иҪҪдәҶйҰ–24еј 
    try {
        const ts = localStorage.getItem(IMAGE_READY_KEY);
        if (ts && (Date.now() - parseInt(ts, 10)) < 7200000) {
            // еҗҺеҸ°еҠ иҪҪеү©дҪҷеӣҫзүҮпјҲдёҚйҳ»еЎһпјүпјҢenableControls з”ұеӨ–еұӮз»ҹдёҖи°ғз”Ё
            loadRemainingInBackground();
            return;
        }
    } catch(e) {}

    // ж Үи®°зјәеӨұжҲ–иҝҮжңҹ вҖ” е…ҲеҠ иҪҪйҰ–24еј еҶҚеҗҜз”ЁжҺ§д»¶
    const allImages = buildImageList();
    const FIRST_BATCH = 24;
    const TOTAL = allImages.length;

    setProgress(94, 'жӯЈеңЁйў„еҠ иҪҪзғӯеҠӣеӣҫ (0/' + FIRST_BATCH + ')...');
    for (let i = 0; i < FIRST_BATCH; i += 6) {
        await loadBatchRange(allImages, i, Math.min(i + 6, FIRST_BATCH));
        const loaded = Math.min(FIRST_BATCH, i + 6);
        setProgress(94 + Math.round(loaded / FIRST_BATCH * 4), 'жӯЈеңЁйў„еҠ иҪҪзғӯеҠӣеӣҫ (' + loaded + '/' + FIRST_BATCH + ')...');
    }

    try { localStorage.setItem(IMAGE_READY_KEY, Date.now().toString()); } catch(e) {}

    // еҗҺеҸ°з»§з»ӯеҠ иҪҪеү©дҪҷ 108 еј 
    loadRemainingInBackground();

    function loadBatchRange(list, start, end) {
        return new Promise(function(resolve) {
            let done = 0;
            const n = end - start;
            for (let i = start; i < end; i++) {
                const img = new Image();
                img.onload = function() { done++; if (done >= n) resolve(); };
                img.onerror = function() { done++; if (done >= n) resolve(); };
                img.src = IMG_BASE + list[i];
            }
        });
    }
}

function loadRemainingInBackground() {
    const allImages = buildImageList();
    const START = 24;
    const TOTAL = allImages.length;
    let idx = START;
    function nextBatch() {
        if (idx >= TOTAL) {
            try { localStorage.setItem('carbonweb_full_loaded', Date.now().toString()); } catch(e) {}
            return;
        }
        const end = Math.min(idx + 6, TOTAL);
        for (let i = idx; i < end; i++) {
            const img = new Image();
            img.src = IMG_BASE + allImages[i];
        }
        idx = end;
        setTimeout(nextBatch, 150);
    }
    setTimeout(nextBatch, 500);
}
